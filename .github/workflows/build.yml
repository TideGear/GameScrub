name: Build APK

# GameHub with PC-accurate XInput rumble — the vibration mod only,
# nothing else. Adds dual-motor low/high dispatch + libevshim sustained
# rumble keepalive on top of stock GameHub. Otherwise unchanged from
# upstream Tencent build.
#
# Supports stock 5.3.5, 6.0.1, and 6.0.2 (apply_vibration_patches.py auto-
# detects the version from the smali layout of the decompiled tree).
#
# Setup once per base version: upload the original GameHub APK as an
# asset on a release tagged `base-apk-<version>` in this repo (e.g.
# `base-apk-6.0.2`). The workflow `gh release download`s from there.

on:
  push:
    tags:
      - 'v*-5.3.5*'
      - 'v*-6.0.1*'
      - 'v*-6.0.2*'
  workflow_dispatch:
    inputs:
      base_version:
        description: 'Stock GameHub version to patch (must have a base-apk-<version> release).'
        required: true
        default: '6.0.2'
        type: choice
        options:
          - '6.0.2'
          - '6.0.1'
          - '5.3.5'
      side_by_side:
        description: 'Rename package for side-by-side install (com.xiaoji.egggame.v<digits>). Tick this on a build that you want to coexist with another GameHub variant on the same device. Tag-triggered builds always keep the canonical package.'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve base version
        id: base
        run: |
          # workflow_dispatch → use the chosen input.
          # tag push        → parse the version out of the tag
          #                   (e.g. v1.2-6.0.2 → 6.0.2).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ inputs.base_version }}"
          else
            REF="${GITHUB_REF#refs/tags/}"
            VER="$(echo "$REF" | sed -nE 's/.*-(5\.3\.5|6\.0\.[0-9]+).*/\1/p')"
          fi
          if [ -z "$VER" ]; then
            echo "ERROR: could not resolve base version from event=${{ github.event_name }} ref=${GITHUB_REF}" >&2
            exit 1
          fi

          # Side-by-side install: rename package to make this build
          # installable alongside another GameHub. e.g. 5.3.5 → .v535,
          # 6.0.1 → .v601, 6.0.2 → .v602. Tag-triggered builds always
          # keep the canonical package (inputs.side_by_side is empty
          # for non-workflow_dispatch events).
          SBS="${{ inputs.side_by_side }}"
          if [ "$SBS" = "true" ]; then
            PKG_SUFFIX=".v$(echo "$VER" | tr -d '.')"
            OUT_SUFFIX="-sbs"
          else
            PKG_SUFFIX=""
            OUT_SUFFIX=""
          fi

          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "release_tag=base-apk-$VER" >> "$GITHUB_OUTPUT"
          echo "package_suffix=$PKG_SUFFIX" >> "$GITHUB_OUTPUT"
          echo "out_suffix=$OUT_SUFFIX" >> "$GITHUB_OUTPUT"
          echo "Base version: $VER"
          if [ -n "$PKG_SUFFIX" ]; then
            echo "Side-by-side rename: package will become com.xiaoji.egggame${PKG_SUFFIX}"
          fi

      - name: Download original GameHub APK
        run: |
          gh release download "${{ steps.base.outputs.release_tag }}" --pattern "*.apk" -D base/ -R ${{ github.repository }}
          ls base/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install apktool
        run: |
          APKTOOL_VER=2.9.3
          mkdir -p $HOME/bin
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VER}/apktool_${APKTOOL_VER}.jar" -O $HOME/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" -O $HOME/bin/apktool
          chmod +x $HOME/bin/apktool
          echo "$HOME/bin" >> $GITHUB_PATH
          java -jar $HOME/bin/apktool.jar --version

      - name: Decompile APK
        run: |
          APK=$(ls base/*.apk | head -1)
          echo "Decompiling: $APK"
          java -jar $HOME/bin/apktool.jar d "$APK" -o apktool_out -f

      - name: Strip newer-Android manifest attributes apktool 2.9.3 can't reassemble
        run: |
          # 6.0.x's AndroidManifest uses two attributes whose namespaces aren't in
          # the framework apktool 2.9.3 ships with. They're cosmetic (BLUETOOTH_SCAN
          # flag + predictive-back opt-in); stripping is harmless for a vibration-mod
          # test build. The regexes are no-ops on 5.3.5 where these attributes don't
          # exist in the manifest.
          python3 - <<'PYEOF'
          import re
          with open('apktool_out/AndroidManifest.xml', 'r', encoding='utf-8') as f:
              content = f.read()
          content = re.sub(r' android:usesPermissionFlags="[^"]*"', '', content)
          content = re.sub(r' android:enableOnBackInvokedCallback="[^"]*"', '', content)
          with open('apktool_out/AndroidManifest.xml', 'w', encoding='utf-8') as f:
              f.write(content)
          print("manifest stripped")
          PYEOF

      - name: Apply BhVibration smali patches
        run: |
          # apply_vibration_patches.py auto-detects 5.3.5, 6.0.1, or 6.0.2
          # from the smali layout of the decompiled tree. Per-version anchor
          # set + rename maps live at the top of that script.
          python3 scripts/apply_vibration_patches.py apktool_out

      - name: Rename package for side-by-side install
        if: steps.base.outputs.package_suffix != ''
        env:
          BASE_VER: ${{ steps.base.outputs.version }}
          PKG_SUFFIX: ${{ steps.base.outputs.package_suffix }}
        run: |
          set -e
          OLD_PKG="com.xiaoji.egggame"
          NEW_PKG="${OLD_PKG}${PKG_SUFFIX}"
          echo "Side-by-side rename: $OLD_PKG -> $NEW_PKG"

          # 1. apktool.yml: set packageInfo.renameManifestPackage so apktool b
          # tells aapt2 to rewrite the <manifest package="..."> attribute on
          # rebuild. The key is NESTED under packageInfo: with two-space
          # indent — a top-level append silently no-ops. apktool 2.9.3 has
          # no --rename-manifest-package CLI flag (removed after 2.6.x in
          # favour of the yml setting).
          if grep -qE "^[[:space:]]+renameManifestPackage:" apktool_out/apktool.yml; then
            sed -i -E "s|^([[:space:]]+)renameManifestPackage:.*|\1renameManifestPackage: ${NEW_PKG}|" apktool_out/apktool.yml
          else
            sed -i "/^packageInfo:/a\\  renameManifestPackage: ${NEW_PKG}" apktool_out/apktool.yml
          fi
          echo "apktool.yml packageInfo block:"
          grep -A2 "^packageInfo:" apktool_out/apktool.yml
          echo ""

          # 2. aapt2's renameManifestPackage logic only updates the
          # <manifest package="..."> attribute — FileProvider authorities,
          # custom permission names, and android:targetPackage that bake
          # the package as a literal prefix stay pointing at the old
          # value. Two consequences if we don't rewrite them ourselves:
          #
          #   a) Authority collision with the canonical install. Android
          #      enforces global uniqueness of provider authorities; when
          #      both variants are installed, only ONE keeps the authority
          #      (usually the first-installed) and the other's calls into
          #      its own provider go to the wrong app's data.
          #   b) Custom permissions declared under the old package can
          #      similarly only be declared by one app — second-installer
          #      silently loses its permission grants, causing odd
          #      runtime IPC failures (e.g. Steam-launcher status pipes,
          #      FCM/pushcore service binds).
          #
          # Use Python to walk the manifest XML attributes explicitly:
          #   - android:authorities  → rename when prefixed with OLD_PKG
          #   - android:name         → rename ONLY for <permission> and
          #                            <uses-permission> elements (these
          #                            are permission names, not class
          #                            refs); leave component android:name
          #                            on <activity>/<service>/<provider>/
          #                            <receiver> alone — those are FQ
          #                            class refs pointing at smali we
          #                            are NOT renaming.
          #   - android:permission   → rename when prefixed with OLD_PKG
          #   - android:targetPackage → rename when equal to OLD_PKG
          #
          # Apktool's text manifest is whitespace-sensitive (apktool
          # reuses formatting during reassembly), so the rewriter does
          # targeted regex on each attribute rather than full XML parse+
          # serialize which would normalise whitespace and risk apktool
          # reassembly errors.
          python3 - <<PYEOF
          import re, sys
          OLD = "${OLD_PKG}"
          NEW = "${NEW_PKG}"
          path = "apktool_out/AndroidManifest.xml"
          with open(path, encoding="utf-8") as f:
              content = f.read()

          changes = {"authorities": 0, "perm_decl": 0, "perm_use": 0, "perm_ref": 0, "target_pkg": 0}

          # 2a. Provider authorities. Accept any authority whose value
          # contains the old package as a substring (handles both prefix
          # form like "OLD.foo" AND the rarer suffix/embedded form like
          # "poster.OLD" observed in stock 5.3.5).
          def rewrite_authorities(m):
              val = m.group(1)
              # Authorities can be a list ";"-separated.
              parts = val.split(";")
              new_parts = []
              for p in parts:
                  if OLD in p:
                      new_p = p.replace(OLD, NEW)
                      if new_p != p:
                          changes["authorities"] += 1
                      new_parts.append(new_p)
                  else:
                      new_parts.append(p)
              return 'android:authorities="' + ";".join(new_parts) + '"'

          content = re.sub(r'android:authorities="([^"]*)"', rewrite_authorities, content)

          # 2b. Permission declarations (<permission android:name="OLD.permission.X" .../>)
          # and uses (<uses-permission android:name="OLD.permission.X"/>).
          # Restrict to element tags <permission> and <uses-permission>
          # so we don't touch component android:name attributes on
          # <activity>/<service>/<provider>/<receiver>.
          def rewrite_perm_decl(m):
              tag, before, name, after = m.group(1), m.group(2), m.group(3), m.group(4)
              if name.startswith(OLD + ".") or name == OLD:
                  changes["perm_decl" if tag == "permission" else "perm_use"] += 1
                  return f'<{tag}{before}android:name="{NEW + name[len(OLD):]}"{after}'
              return m.group(0)

          content = re.sub(
              r'<(permission|uses-permission)([^>]*?)android:name="([^"]*)"([^>]*)',
              rewrite_perm_decl, content
          )

          # 2c. android:permission="..." attribute references on any element.
          def rewrite_perm_ref(m):
              val = m.group(1)
              if val.startswith(OLD + ".") or val == OLD:
                  changes["perm_ref"] += 1
                  return f'android:permission="{NEW + val[len(OLD):]}"'
              return m.group(0)

          content = re.sub(r'android:permission="([^"]*)"', rewrite_perm_ref, content)

          # 2d. android:targetPackage (instrumentation).
          def rewrite_target(m):
              if m.group(1) == OLD:
                  changes["target_pkg"] += 1
                  return f'android:targetPackage="{NEW}"'
              return m.group(0)

          content = re.sub(r'android:targetPackage="([^"]*)"', rewrite_target, content)

          with open(path, "w", encoding="utf-8") as f:
              f.write(content)

          print(f"Manifest rewrites: {changes}")
          if sum(changes.values()) == 0:
              print("WARNING: no manifest attributes were rewritten. This is unusual unless stock GameHub has zero package-prefixed authorities/permissions.", file=sys.stderr)
          PYEOF

          # 2e. Verification: dump every authorities/permission value left
          # in the manifest after rewriting, so CI logs show exactly what
          # the final APK will declare. If anything still references the
          # OLD package, the install will collide with the canonical app.
          echo ""
          echo "Manifest authorities after rewrite:"
          grep -oE 'android:authorities="[^"]*"' apktool_out/AndroidManifest.xml | sort -u | sed 's/^/  /'
          echo "Manifest permission names after rewrite:"
          grep -oE '<(uses-)?permission[^>]*android:name="[^"]*"' apktool_out/AndroidManifest.xml | grep -oE 'android:name="[^"]*"' | sort -u | sed 's/^/  /'
          echo ""
          if grep -qE 'android:authorities="'"${OLD_PKG}"'($|[^.]|\.)' apktool_out/AndroidManifest.xml; then
            # Authority still starts with old pkg AND is not part of a longer pkg name like com.xiaoji.egggames
            REMAINING=$(grep -oE 'android:authorities="'"${OLD_PKG}"'[^"]*"' apktool_out/AndroidManifest.xml | sort -u || true)
            if [ -n "$REMAINING" ]; then
              echo "ERROR: authorities still pointing at $OLD_PKG after rewrite:" >&2
              echo "$REMAINING" >&2
              exit 1
            fi
          fi

          # 3. smali const-string rewrite (BuildConfig.APPLICATION_ID inlines
          # and any SDK init that bakes in a getPackageName() comparison).
          # Trailing-quote bound prevents clobbering longer strings such as
          # "com.xiaoji.egggame.MainActivity" — those are class refs that
          # must stay pointing at the unrenamed smali tree.
          SMALI_HITS=$(grep -rl "\"${OLD_PKG}\"" apktool_out/smali* 2>/dev/null | wc -l)
          echo "smali files containing bare \"${OLD_PKG}\" literal: ${SMALI_HITS}"
          if [ "$SMALI_HITS" -gt 0 ]; then
            grep -rl "\"${OLD_PKG}\"" apktool_out/smali* 2>/dev/null \
              | xargs sed -i "s|\"${OLD_PKG}\"|\"${NEW_PKG}\"|g"
            echo "smali bare-literal rewrite applied to ${SMALI_HITS} file(s)"
          fi

          # 4. App label suffix: append the version so home-screen icons are
          # distinguishable when both variants are installed. Best-effort —
          # 6.0.x's UI is mostly Compose-resourced, so only the launcher
          # Activity's android:label="@string/app_name" reflects this; the
          # Compose-rendered top bar inside the app stays unchanged.
          if [ -f apktool_out/res/values/strings.xml ]; then
            sed -i -E "s|(<string name=\"app_name\">)([^<]*)(</string>)|\1\2 (${BASE_VER})\3|" \
              apktool_out/res/values/strings.xml
            echo "app_name label suffixed with (${BASE_VER})"
          fi

          echo ""
          echo "Side-by-side prep complete."

      - name: Build libevshim.so (guest-side SDL keepalive)
        run: |
          set -e
          NDK_HOME="${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT:-}}"
          if [ -z "$NDK_HOME" ] || [ ! -d "$NDK_HOME" ]; then
            NDK_HOME=$(ls -d "${ANDROID_SDK_ROOT}"/ndk/* 2>/dev/null | sort -V | tail -1)
          fi
          if [ -z "$NDK_HOME" ] || [ ! -d "$NDK_HOME" ]; then
            NDK_HOME="${ANDROID_SDK_ROOT}/ndk-bundle"
          fi
          echo "Using NDK: $NDK_HOME"
          if ! command -v ninja >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y ninja-build
          fi
          cmake -S native/evshim -B build/evshim \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja
          ninja -C build/evshim
          mkdir -p apktool_out/lib/arm64-v8a
          cp build/evshim/libevshim.so apktool_out/lib/arm64-v8a/libevshim.so
          chmod 0755 apktool_out/lib/arm64-v8a/libevshim.so
          file apktool_out/lib/arm64-v8a/libevshim.so

      - name: Rebuild and sign
        run: |
          set -e

          # Rebuild. For side-by-side builds, packageInfo.renameManifestPackage
          # was already set in apktool.yml by the rename step above; apktool
          # reads it here and tells aapt2 to rewrite the manifest's package=
          # attribute. (apktool 2.9.3 has no --rename-manifest-package CLI
          # flag — the yml setting is the only entry point.)
          java -jar $HOME/bin/apktool.jar b apktool_out -o rebuilt-unsigned.apk

          # Compile vibration extension Java + d8 to classes<N>.dex, where
          # <N> is the next free dex slot after the rebuilt APK's stock dex
          # files. (6.0.x has 6 stock dex files → classes7; 5.3.5 has 11
          # stock dex files → classes12.)
          ANDROID_JAR=$(ls $ANDROID_SDK_ROOT/platforms/android-*/android.jar 2>/dev/null | sort -V | tail -1)
          mkdir -p ext_classes
          javac -source 8 -target 8 -cp "$ANDROID_JAR" -d ext_classes \
              extension/BhVibrationController.java \
              extension/BhVibrationSettingsActivity.java
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          mkdir -p ext_dex
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/d8 \
              --release --min-api 26 --output ext_dex \
              $(find ext_classes -name "*.class")
          MAX_DEX=$(unzip -l rebuilt-unsigned.apk | awk '
              match($0, /classes([0-9]*)\.dex$/, m) {
                  n = (m[1] == "" ? 1 : m[1] + 0);
                  if (n > max) max = n;
              }
              END { print max + 0 }
          ')
          NEXT_DEX=$((MAX_DEX + 1))
          DEX_NAME="classes${NEXT_DEX}.dex"
          echo "Rebuilt APK has ${MAX_DEX} stock dex files; injecting extension as ${DEX_NAME}"
          cp ext_dex/classes.dex "$DEX_NAME"
          zip -j rebuilt-unsigned.apk "$DEX_NAME"

          # Align
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/zipalign -f -v 4 \
              rebuilt-unsigned.apk rebuilt-aligned.apk

          # Sign with the repo's testkey
          OUT="GameHub-Vibration-Fix-${{ steps.base.outputs.version }}${{ steps.base.outputs.out_suffix }}.apk"
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner sign \
              --key testkey.pk8 --cert testkey.x509.pem \
              --out "$OUT" \
              rebuilt-aligned.apk
          ls -lh "$OUT"
          echo "out_apk=$OUT" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameHub-Vibration-Fix-${{ steps.base.outputs.version }}${{ steps.base.outputs.out_suffix }}
          path: ${{ env.out_apk }}
