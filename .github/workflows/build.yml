name: Build APK

# GameHub with PC-accurate XInput rumble — the vibration mod only,
# nothing else. Adds dual-motor low/high dispatch + libevshim sustained
# rumble keepalive on top of stock GameHub. Otherwise unchanged from
# upstream Tencent build.
#
# Supports stock 5.3.5, 6.0.2, and 6.0.4 (apply_vibration_patches.py
# auto-detects the version from the smali layout of the decompiled tree).
#
# Setup once per base version: upload the original GameHub APK as an
# asset on a release tagged `base-apk-<version>` in this repo (e.g.
# `base-apk-6.0.4`). The workflow `gh release download`s from there.

on:
  push:
    tags:
      - 'v*-5.3.5*'
      - 'v*-6.0.2*'
      - 'v*-6.0.4*'
  workflow_dispatch:
    inputs:
      base_version:
        description: 'Stock GameHub version to patch (must have a base-apk-<version> release).'
        required: true
        default: '6.0.4'
        type: choice
        options:
          - '6.0.4'
          - '6.0.2'
          - '5.3.5'
      bypass_login:
        description: 'Bypass the GameHub login screen. 6.0.x also bypasses the splash privacy popup. 5.3.5 has its own privacy bypass + guide-step skip.'
        required: false
        default: false
        type: boolean
      side_by_side:
        description: 'Rename 5.3.5 package to gamehub.v535 so it installs alongside a canonical 6.0.x. Ignored on 6.0.x.'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve base version
        id: base
        run: |
          # workflow_dispatch → use the chosen input.
          # tag push        → parse the version out of the tag
          #                   (e.g. v1.2-6.0.4 → 6.0.4).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ inputs.base_version }}"
          else
            REF="${GITHUB_REF#refs/tags/}"
            VER="$(echo "$REF" | sed -nE 's/.*-(5\.3\.5|6\.0\.2|6\.0\.4).*/\1/p')"
          fi
          if [ -z "$VER" ]; then
            echo "ERROR: could not resolve base version from event=${{ github.event_name }} ref=${GITHUB_REF}" >&2
            exit 1
          fi

          # Side-by-side rename is opt-in via workflow_dispatch only.
          # `inputs.side_by_side` is empty for tag-push events, which
          # evaluates to false → tag-driven release builds keep the
          # canonical package. Only meaningful on 5.3.5; ignored on 6.0.x.
          SBS_FLAG="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
              && [ "${{ inputs.side_by_side }}" = "true" ] \
              && [ "$VER" = "5.3.5" ]; then
            SBS_FLAG="true"
          fi

          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "release_tag=base-apk-$VER" >> "$GITHUB_OUTPUT"
          echo "side_by_side=$SBS_FLAG" >> "$GITHUB_OUTPUT"
          echo "Base version: $VER (side_by_side=$SBS_FLAG)"

      - name: Download original GameHub APK
        run: |
          gh release download "${{ steps.base.outputs.release_tag }}" --pattern "*.apk" -D base/ -R ${{ github.repository }}
          ls base/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install apktool
        run: |
          APKTOOL_VER=2.9.3
          mkdir -p $HOME/bin
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VER}/apktool_${APKTOOL_VER}.jar" -O $HOME/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" -O $HOME/bin/apktool
          chmod +x $HOME/bin/apktool
          echo "$HOME/bin" >> $GITHUB_PATH
          java -jar $HOME/bin/apktool.jar --version

      - name: Decompile APK
        run: |
          APK=$(ls base/*.apk | head -1)
          echo "Decompiling: $APK"
          java -jar $HOME/bin/apktool.jar d "$APK" -o apktool_out -f

      - name: Strip newer-Android manifest attributes apktool 2.9.3 can't reassemble
        run: |
          # 6.0.x's AndroidManifest uses two attributes whose namespaces aren't in
          # the framework apktool 2.9.3 ships with. They're cosmetic (BLUETOOTH_SCAN
          # flag + predictive-back opt-in); stripping is harmless for a vibration-mod
          # test build. The regexes are no-ops on 5.3.5 where these attributes don't
          # exist in the manifest.
          python3 - <<'PYEOF'
          import re
          with open('apktool_out/AndroidManifest.xml', 'r', encoding='utf-8') as f:
              content = f.read()
          content = re.sub(r' android:usesPermissionFlags="[^"]*"', '', content)
          content = re.sub(r' android:enableOnBackInvokedCallback="[^"]*"', '', content)
          with open('apktool_out/AndroidManifest.xml', 'w', encoding='utf-8') as f:
              f.write(content)
          print("manifest stripped")
          PYEOF

      - name: Apply BhVibration smali patches
        run: |
          # apply_vibration_patches.py auto-detects 5.3.5 / 6.0.2 / 6.0.4
          # from the smali layout of the decompiled tree. Per-version
          # anchor set + rename maps live at the top of that script.
          python3 scripts/apply_vibration_patches.py apktool_out

      - name: Apply login bypass (optional)
        if: inputs.bypass_login == true
        run: |
          # 6.0.2: rewrites the isLoggedIn-combiner lambda's invokeSuspend
          # body to return Boolean.TRUE (skips login screen) and shorts
          # the SharedPreferences getter for "app_agreement_agreed" to
          # always return true (skips the splash privacy popup).
          # 5.3.5: replaces UserManager.isLogin / getUid / getUsername /
          # getNickname / getAvatar with synthetic constants so the
          # launcher accepts the user as signed-in (skips login screen).
          python3 scripts/apply_login_bypass.py apktool_out

      - name: Rename package for side-by-side install (5.3.5 only)
        if: steps.base.outputs.side_by_side == 'true'
        run: |
          # 5.3.5 and 6.0.2 both ship as package "com.xiaoji.egggame", so
          # without renaming you can only have one installed at a time. We
          # treat 6.0.2 as the canonical install and rename the 5.3.5
          # build to "gamehub.v535" so both coexist.
          #
          # Approach mirrors BannerHub upstream (`gamehub.lite`): edit the
          # apktool-decoded text manifest directly. Apktool's own
          # renameManifestPackage / aapt2 --rename-manifest-package flag
          # would only update <manifest package="..."> and miss every
          # android:authorities= / android:name= permission / etc string,
          # which leads to authority collisions with the canonical install
          # at runtime (the same authority can't be claimed by two
          # packages; second-installer silently loses).
          #
          # What we rename:
          #   - <manifest package="...">                  ← required by Android
          #   - android:authorities="com.xiaoji.egggame.*" → "gamehub.v535.*"
          #   - <permission> / <uses-permission> custom names with that prefix
          #   - android:permission= / android:targetPackage= refs
          #
          # What we DO NOT rename:
          #   - android:name on <activity>/<service>/<provider>/<receiver>
          #     — those are fully-qualified class refs and point at smali
          #     classes we never move. Renaming them would orphan the
          #     classes.
          #   - smali const-string "com.xiaoji.egggame" literals — leaving
          #     these intact mirrors BannerHub's behaviour (which doesn't
          #     touch smali strings either) and the only known case where
          #     it matters is BuildConfig.APPLICATION_ID inlines, which
          #     R8 has typically stripped as dead code already.
          #
          # The use of a *disjoint* new package (`gamehub.v535`, not
          # `com.xiaoji.egggame.v535`) is deliberate: a suffix-style name
          # leaves the old package as a substring of every renamed
          # authority, which previous attempts confirmed can confuse
          # Steam-launcher hardcoded prefix checks (init_failed:1004
          # "Steam service setup failed"). BannerHub avoids this by
          # using `gamehub.lite` for the same reason.
          OLD_PKG="com.xiaoji.egggame"
          NEW_PKG="gamehub.v535"
          echo "Renaming 5.3.5 build: $OLD_PKG -> $NEW_PKG"
          python3 - <<PYEOF
          import re, sys
          OLD = "${OLD_PKG}"
          NEW = "${NEW_PKG}"
          path = "apktool_out/AndroidManifest.xml"
          with open(path, encoding="utf-8") as f:
              content = f.read()
          counts = {"package": 0, "authorities": 0, "perm_decl": 0, "perm_use": 0, "perm_ref": 0, "target_pkg": 0}

          # 1. <manifest package="OLD">.
          new_content, n = re.subn(
              r'(<manifest\b[^>]*\bpackage=")' + re.escape(OLD) + r'(")',
              lambda m: m.group(1) + NEW + m.group(2),
              content, count=1,
          )
          counts["package"] = n
          content = new_content

          # 2. android:authorities — any value that *contains* OLD as a
          # token. Authorities may be semicolon-separated lists, hence
          # the per-segment treatment.
          def rw_auth(m):
              parts = []
              for p in m.group(1).split(";"):
                  if OLD in p:
                      counts["authorities"] += 1
                      parts.append(p.replace(OLD, NEW))
                  else:
                      parts.append(p)
              return 'android:authorities="' + ";".join(parts) + '"'
          content = re.sub(r'android:authorities="([^"]*)"', rw_auth, content)

          # 3. <permission> / <uses-permission> android:name with OLD prefix.
          def rw_perm_decl(m):
              tag, before, name, after = m.group(1), m.group(2), m.group(3), m.group(4)
              if name == OLD or name.startswith(OLD + "."):
                  counts["perm_decl" if tag == "permission" else "perm_use"] += 1
                  return f'<{tag}{before}android:name="{NEW + name[len(OLD):]}"{after}'
              return m.group(0)
          content = re.sub(
              r'<(permission|uses-permission)([^>]*?)android:name="([^"]*)"([^>]*)',
              rw_perm_decl, content,
          )

          # 4. android:permission= refs.
          def rw_perm_ref(m):
              v = m.group(1)
              if v == OLD or v.startswith(OLD + "."):
                  counts["perm_ref"] += 1
                  return f'android:permission="{NEW + v[len(OLD):]}"'
              return m.group(0)
          content = re.sub(r'android:permission="([^"]*)"', rw_perm_ref, content)

          # 5. android:targetPackage (instrumentation).
          def rw_target(m):
              if m.group(1) == OLD:
                  counts["target_pkg"] += 1
                  return f'android:targetPackage="{NEW}"'
              return m.group(0)
          content = re.sub(r'android:targetPackage="([^"]*)"', rw_target, content)

          with open(path, "w", encoding="utf-8") as f:
              f.write(content)
          print(f"Manifest rewrites: {counts}")
          if counts["package"] != 1:
              print(f"ERROR: expected exactly 1 <manifest package=\"{OLD}\"> rename, got {counts['package']}", file=sys.stderr)
              sys.exit(1)

          # Verify no authority still references OLD as a token.
          stale = []
          for m in re.finditer(r'android:authorities="([^"]*)"', content):
              for auth in m.group(1).split(";"):
                  if OLD in auth and NEW not in auth:
                      stale.append(auth)
          if stale:
              print(f"ERROR: authorities still reference {OLD}:", file=sys.stderr)
              for a in sorted(set(stale)):
                  print(f"  {a}", file=sys.stderr)
              sys.exit(1)
          print("Authority rewrite verification: OK")
          PYEOF

          echo ""
          echo "Manifest authorities after rewrite:"
          grep -oE 'android:authorities="[^"]*"' apktool_out/AndroidManifest.xml | sort -u | sed 's/^/  /'

          # 6. Suffix the launcher label so the home-screen icon for the
          # renamed install reads "GameHub Lite (5.3.5)" / similar, so it
          # can be told apart from a canonical install at a glance.
          if [ -f apktool_out/res/values/strings.xml ]; then
            sed -i -E 's|(<string name="app_name">)([^<]*)(</string>)|\1\2 (5.3.5)\3|' \
              apktool_out/res/values/strings.xml
            echo "app_name suffixed with (5.3.5)"
          fi

      - name: Build libevshim.so (guest-side SDL keepalive)
        run: |
          set -e
          NDK_HOME="${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT:-}}"
          if [ -z "$NDK_HOME" ] || [ ! -d "$NDK_HOME" ]; then
            NDK_HOME=$(ls -d "${ANDROID_SDK_ROOT}"/ndk/* 2>/dev/null | sort -V | tail -1)
          fi
          if [ -z "$NDK_HOME" ] || [ ! -d "$NDK_HOME" ]; then
            NDK_HOME="${ANDROID_SDK_ROOT}/ndk-bundle"
          fi
          echo "Using NDK: $NDK_HOME"
          if ! command -v ninja >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y ninja-build
          fi
          cmake -S native/evshim -B build/evshim \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja
          ninja -C build/evshim
          mkdir -p apktool_out/lib/arm64-v8a
          cp build/evshim/libevshim.so apktool_out/lib/arm64-v8a/libevshim.so
          chmod 0755 apktool_out/lib/arm64-v8a/libevshim.so
          file apktool_out/lib/arm64-v8a/libevshim.so

      - name: Rebuild and sign
        run: |
          set -e

          # Rebuild
          java -jar $HOME/bin/apktool.jar b apktool_out -o rebuilt-unsigned.apk

          # Compile vibration extension Java + d8 to classes<N>.dex, where
          # <N> is the next free dex slot after the rebuilt APK's stock dex
          # files. (6.0.x has 6 stock dex files → classes7; 5.3.5 has 11
          # stock dex files → classes12.)
          ANDROID_JAR=$(ls $ANDROID_SDK_ROOT/platforms/android-*/android.jar 2>/dev/null | sort -V | tail -1)
          mkdir -p ext_classes
          javac -source 8 -target 8 -cp "$ANDROID_JAR" -d ext_classes \
              extension/BhVibrationController.java \
              extension/BhVibrationSettingsActivity.java
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          mkdir -p ext_dex
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/d8 \
              --release --min-api 26 --output ext_dex \
              $(find ext_classes -name "*.class")
          MAX_DEX=$(unzip -l rebuilt-unsigned.apk | awk '
              match($0, /classes([0-9]*)\.dex$/, m) {
                  n = (m[1] == "" ? 1 : m[1] + 0);
                  if (n > max) max = n;
              }
              END { print max + 0 }
          ')
          NEXT_DEX=$((MAX_DEX + 1))
          DEX_NAME="classes${NEXT_DEX}.dex"
          echo "Rebuilt APK has ${MAX_DEX} stock dex files; injecting extension as ${DEX_NAME}"
          cp ext_dex/classes.dex "$DEX_NAME"
          zip -j rebuilt-unsigned.apk "$DEX_NAME"

          # Align
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/zipalign -f -v 4 \
              rebuilt-unsigned.apk rebuilt-aligned.apk

          # Sign with the repo's testkey. Suffix output name with "-sbs"
          # when the build was renamed for side-by-side install so the
          # canonical and SBS artifacts don't collide if you build both.
          SBS_SUFFIX=""
          if [ "${{ steps.base.outputs.side_by_side }}" = "true" ]; then
            SBS_SUFFIX="-sbs"
          fi
          OUT="GameHub-Vibration-Fix-${{ steps.base.outputs.version }}${SBS_SUFFIX}.apk"
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner sign \
              --key testkey.pk8 --cert testkey.x509.pem \
              --out "$OUT" \
              rebuilt-aligned.apk
          ls -lh "$OUT"
          echo "out_apk=$OUT" >> "$GITHUB_ENV"
          echo "out_artifact=GameHub-Vibration-Fix-${{ steps.base.outputs.version }}${SBS_SUFFIX}" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.out_artifact }}
          path: ${{ env.out_apk }}
