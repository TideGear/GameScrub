name: Build APK

# GameScrub — GameHub with PC-accurate XInput rumble plus a port of
# bannerhub-revanced's privacy patch set. Adds dual-motor low/high
# dispatch + preload-free SDL rumble keepalive (winebus.so duration
# patched on disk) and kills Firebase / GMS Measurement / Mob Push /
# XiaoJi heartbeat+events / JieLi OTA on top of stock GameHub 6.0.4.
# Otherwise unchanged from upstream Tencent build.
#
# One-time setup: upload the original GameHub APK as an asset on a
# release tagged `base-apk-6.0.4` in this repo. The workflow
# `gh release download`s from there.

on:
  push:
    tags:
      - 'v*-6.0.4*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve base version
        id: base
        run: |
          # Only 6.0.4 is supported. Kept as a step so downstream steps can
          # still reference steps.base.outputs.* without restructuring.
          echo "version=6.0.4" >> "$GITHUB_OUTPUT"
          echo "release_tag=base-apk-6.0.4" >> "$GITHUB_OUTPUT"
          echo "Base version: 6.0.4"

      - name: Download original GameHub APK
        run: |
          gh release download "${{ steps.base.outputs.release_tag }}" --pattern "*.apk" -D base/ -R ${{ github.repository }}
          ls base/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install apktool
        run: |
          APKTOOL_VER=2.9.3
          mkdir -p $HOME/bin
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VER}/apktool_${APKTOOL_VER}.jar" -O $HOME/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" -O $HOME/bin/apktool
          chmod +x $HOME/bin/apktool
          echo "$HOME/bin" >> $GITHUB_PATH
          java -jar $HOME/bin/apktool.jar --version

      - name: Decompile APK
        run: |
          APK=$(ls base/*.apk | head -1)
          echo "Decompiling: $APK"
          java -jar $HOME/bin/apktool.jar d "$APK" -o apktool_out -f

      - name: Strip newer-Android manifest attributes apktool 2.9.3 can't reassemble
        run: |
          # 6.0.x's AndroidManifest uses two attributes whose namespaces aren't in
          # the framework apktool 2.9.3 ships with. They're cosmetic (BLUETOOTH_SCAN
          # flag + predictive-back opt-in); stripping is harmless for a vibration-mod
          # test build.
          python3 - <<'PYEOF'
          import re
          with open('apktool_out/AndroidManifest.xml', 'r', encoding='utf-8') as f:
              content = f.read()
          content = re.sub(r' android:usesPermissionFlags="[^"]*"', '', content)
          content = re.sub(r' android:enableOnBackInvokedCallback="[^"]*"', '', content)
          with open('apktool_out/AndroidManifest.xml', 'w', encoding='utf-8') as f:
              f.write(content)
          print("manifest stripped")
          PYEOF

      - name: Apply BhVibration smali patches
        run: |
          # Per-version anchor set + rename map for 6.0.4 lives at the top
          # of the script.
          python3 scripts/apply_vibration_patches.py apktool_out

      - name: Apply privacy patches
        run: |
          # Port of bannerhub-revanced's privacy patch set, scoped to this
          # fork's apktool/Python pipeline. Kills Firebase Analytics +
          # GMS Measurement + Mob Push + the two vgabc.com /events endpoints
          # + the heartbeat playtime tracker + the JieLi OTA URL/native libs.
          # See scripts/apply_privacy_patches.py docstring for the full
          # channel list and the deliberately-skipped surface (Crashlytics
          # settings probe, Steam / GOG / Epic, image CDNs).
          python3 scripts/apply_privacy_patches.py apktool_out

      - name: Apply per-game vibration menu patches
        run: |
          # Injects a "PC Vibration Settings" row into the three per-game
          # menu surfaces (game detail More Menu, library-tile popup,
          # library-list 3-dot popup) so users can change Mode/Intensity
          # per game without launching BhVibrationSettingsActivity by adb.
          # Manifest registers the activity; CVR + resolver short-circuit
          # carry the row label; index-0 captureGameId pins per-game scope.
          # See scripts/apply_menu_patches.py docstring for the full anchor
          # set; if a future base bump shifts the obfuscated class letters
          # the script fails loudly at the missing anchor.
          python3 scripts/apply_menu_patches.py apktool_out

      - name: Apply VJoy export/import patches
        run: |
          # Replaces GameHub's cloud-only on-screen-controls share flow with
          # portable local .gtheme files (no cloud account, no HTTP). Export
          # reads the pristine pre-CDN layout bytes and saves via SAF; import
          # fires a SAF file picker at the import-dialog composition, parses
          # the .gtheme, and registers the layout in egggame.db. The four
          # bytecode hooks are anchored by server-stable URL fragments
          # (vcontroller/shareMap | getMapByShareCode | uploadGtheme) and the
          # upload call-relationship — not R8 letters — so they survive
          # reshuffles. Label relabels + the import-dialog skip ride on the
          # Lxd3;->l1 resolver short-circuit installed by the menu patches.
          # Fails loudly if any anchor is missing or non-unique.
          python3 scripts/apply_export_controls_patches.py apktool_out

      - name: Rebuild and sign
        run: |
          set -e

          # Rebuild
          java -jar $HOME/bin/apktool.jar b apktool_out -o rebuilt-unsigned.apk

          # Compile vibration extension Java + d8 to classes<N>.dex, where
          # <N> is the next free dex slot after the rebuilt APK's stock dex
          # files. (6.0.x has 6 stock dex files → classes7.)
          ANDROID_JAR=$(ls $ANDROID_SDK_ROOT/platforms/android-*/android.jar 2>/dev/null | sort -V | tail -1)
          mkdir -p ext_classes
          javac -source 8 -target 8 -cp "$ANDROID_JAR" -d ext_classes \
              extension/BhVibrationController.java \
              extension/BhVibrationSettingsActivity.java \
              extension/BhMenuGameId.java \
              extension/BhMenuRowClick.java \
              extension/BhSafProxyActivity.java \
              extension/BhVjoyShareHook.java \
              extension/BhVjoyImporter.java \
              extension/BhVjoyJson.java
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          mkdir -p ext_dex
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/d8 \
              --release --min-api 26 --output ext_dex \
              $(find ext_classes -name "*.class")
          MAX_DEX=$(unzip -l rebuilt-unsigned.apk | awk '
              match($0, /classes([0-9]*)\.dex$/, m) {
                  n = (m[1] == "" ? 1 : m[1] + 0);
                  if (n > max) max = n;
              }
              END { print max + 0 }
          ')
          NEXT_DEX=$((MAX_DEX + 1))
          DEX_NAME="classes${NEXT_DEX}.dex"
          echo "Rebuilt APK has ${MAX_DEX} stock dex files; injecting extension as ${DEX_NAME}"
          cp ext_dex/classes.dex "$DEX_NAME"
          zip -j rebuilt-unsigned.apk "$DEX_NAME"

          # Align
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/zipalign -f -v 4 \
              rebuilt-unsigned.apk rebuilt-aligned.apk

          # Sign with the repo's testkey.
          OUT="GameScrub-${{ steps.base.outputs.version }}.apk"
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner sign \
              --key testkey.pk8 --cert testkey.x509.pem \
              --out "$OUT" \
              rebuilt-aligned.apk
          ls -lh "$OUT"
          echo "out_apk=$OUT" >> "$GITHUB_ENV"
          echo "out_artifact=GameScrub-${{ steps.base.outputs.version }}" >> "$GITHUB_ENV"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.out_artifact }}
          path: ${{ env.out_apk }}
