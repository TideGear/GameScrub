name: Build APK (Quick — Normal only)

on:
  push:
    tags:
      - 'v*-pre*'
      - 'v*-beta*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download original APK
        run: |
          gh release download base-apk --pattern "*.apk" -D base/ -R ${{ github.repository }}
          ls base/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install apktool
        run: |
          APKTOOL_VER=2.9.3
          mkdir -p $HOME/bin
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VER}/apktool_${APKTOOL_VER}.jar" -O $HOME/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" -O $HOME/bin/apktool
          chmod +x $HOME/bin/apktool
          echo "$HOME/bin" >> $GITHUB_PATH
          java -jar $HOME/bin/apktool.jar --version

      - name: Decompile APK
        run: |
          APK=$(ls base/*.apk | head -1)
          echo "Decompiling: $APK"
          java -jar $HOME/bin/apktool.jar d "$APK" -o apktool_out -f

      - name: Remove uncompilable apktool artifacts
        run: |
          rm -f apktool_out/res/values/raws.xml
          sed -i '/firebase_common_keep\|firebase_crashlytics_keep/d' apktool_out/res/values/public.xml

          # Extract original classes12.dex and skip smali reassembly (dex index limit workaround)
          APK=$(ls base/*.apk | head -1)
          unzip -p "$APK" classes12.dex > classes12.dex
          rm -rf apktool_out/smali_classes12

      - name: Apply patches
        run: |
          if [ -d "patches" ] && [ "$(ls -A patches)" ]; then
            echo "Applying patches..."
            cp -r patches/. apktool_out/
            echo "Patches applied."
          else
            echo "No patches to apply."
          fi

      - name: Inject build version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "Build version: $VERSION"
          sed -i "s/^  versionName: .*/  versionName: $VERSION/" apktool_out/apktool.yml
          sed -i "s/static final String BH_VERSION = \"[^\"]*\"/static final String BH_VERSION = \"$VERSION\"/" extension/BhSettingsExporter.java
          echo "versionName -> $VERSION"
          echo "BH_VERSION  -> $VERSION"

      - name: Patch AppUtils phone-home version
        run: |
          python3 << 'PYEOF'
          import sys

          def patch(path, old, new, label):
              try:
                  content = open(path, encoding='utf-8').read()
              except UnicodeDecodeError:
                  content = open(path, encoding='latin-1').read()
              if old not in content:
                  print(f"ERROR: anchor not found in {path} for: {label}")
                  sys.exit(1)
              open(path, 'w', encoding='utf-8').write(content.replace(old, new, 1))
              print(f"OK: {label}")

          patch(
              'apktool_out/smali_classes13/com/xj/common/http/ClientParams.smali',
              '    invoke-static {}, Lcom/blankj/utilcode/util/AppUtils;->e()Ljava/lang/String;\n'
              '\n'
              '    .line 40\n'
              '    .line 41\n'
              '    .line 42\n'
              '    move-result-object v3\n',
              '    # BannerHub: hardcode phone-home version — versionName is now BH version\n'
              '    const-string v3, "5.3.5"\n',
              'ClientParams: hardcode AppUtils.getAppVersionName() -> 5.3.5'
          )

          patch(
              'apktool_out/smali_classes7/com/xj/common/http/TokenInterceptor.smali',
              '    invoke-static {}, Lcom/blankj/utilcode/util/AppUtils;->e()Ljava/lang/String;\n'
              '\n'
              '    .line 65\n'
              '    .line 66\n'
              '    .line 67\n'
              '    move-result-object v8\n',
              '    # BannerHub: hardcode phone-home version — versionName is now BH version\n'
              '    const-string v8, "5.3.5"\n',
              'TokenInterceptor: hardcode AppUtils.getAppVersionName() -> 5.3.5'
          )

          print("AppUtils phone-home patches applied.")
          PYEOF

      - name: Apply Grant Root Access smali patches
        run: |
          python3 << 'PYEOF'
          import sys

          def patch(path, old, new, label):
              try:
                  content = open(path, encoding='utf-8').read()
              except UnicodeDecodeError:
                  content = open(path, encoding='latin-1').read()
              if old not in content:
                  print(f"ERROR: anchor not found in {path} for: {label}")
                  sys.exit(1)
              open(path, 'w', encoding='utf-8').write(content.replace(old, new, 1))
              print(f"OK: {label}")

          # Patch 1: SettingBtnHolder.w() — handle click for contentType=0x64 (Grant Root Access)
          # Injected EARLY right after getContentType() move-result p0, while p2 is still a View.
          patch(
              'apktool_out/smali_classes6/com/xj/landscape/launcher/ui/setting/holder/SettingBtnHolder.smali',
              '    move-result p0\n'
              '\n'
              '    .line 15\n'
              '    sget-object p1, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity;'
              '->Companion:Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity$Companion;\n',
              '    move-result p0\n'
              '\n'
              '    # BannerHub: Grant Root Access (contentType=0x64) — injected early while p2 is still a View\n'
              '    const/16 v0, 0x64\n'
              '\n'
              '    if-ne p0, v0, :bh_skip_root_grant\n'
              '\n'
              '    invoke-virtual {p2}, Landroid/view/View;->getContext()Landroid/content/Context;\n'
              '\n'
              '    move-result-object v0\n'
              '\n'
              '    invoke-static {v0}, Lcom/xj/winemu/sidebar/BhRootGrantHelper;->requestRoot(Landroid/content/Context;)V\n'
              '\n'
              '    sget-object v0, Lkotlin/Unit;->a:Lkotlin/Unit;\n'
              '\n'
              '    return-object v0\n'
              '\n'
              '    :bh_skip_root_grant\n'
              '\n'
              '    .line 15\n'
              '    sget-object p1, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity;'
              '->Companion:Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity$Companion;\n',
              'SettingBtnHolder.w(): Grant Root Access click handler (contentType=0x64)'
          )

          # Patch 2: SettingItemEntity.getContentName() — return "Grant Root Access" for contentType=0x64
          patch(
              'apktool_out/smali_classes13/com/xj/landscape/launcher/data/model/entity/SettingItemEntity.smali',
              '    :cond_15\n'
              '    invoke-static {p0}, Lapp/revanced/extension/gamehub/prefs/GameHubPrefs;->getCustomSettingName(I)Ljava/lang/String;\n',
              '    :cond_15\n'
              '    # BannerHub: Grant Root Access (contentType=0x64)\n'
              '    const/16 v0, 0x64\n'
              '\n'
              '    if-ne p0, v0, :bh_skip_grant_name\n'
              '\n'
              '    const-string p0, "Grant Root Access"\n'
              '\n'
              '    return-object p0\n'
              '\n'
              '    :bh_skip_grant_name\n'
              '    invoke-static {p0}, Lapp/revanced/extension/gamehub/prefs/GameHubPrefs;->getCustomSettingName(I)Ljava/lang/String;\n',
              'SettingItemEntity.getContentName(): return "Grant Root Access" for contentType=0x64'
          )

          # Patch 3: SettingItemViewModel.k() — add Grant Root Access TYPE_BTN below Clear Cache
          patch(
              'apktool_out/smali_classes3/com/xj/landscape/launcher/vm/SettingItemViewModel.smali',
              '    invoke-interface {p0, v0}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    .line 79\n'
              '    return-object p0\n'
              '.end method\n'
              '\n'
              '.method public final m()Ljava/util/List;\n',
              '    invoke-interface {p0, v0}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    # BannerHub: Grant Root Access button (contentType=0x64) below Clear Cache\n'
              '    new-instance v0, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity;\n'
              '\n'
              '    const/16 v2, 0x64\n'
              '\n'
              '    invoke-direct/range {v0 .. v6}, Lcom/xj/landscape/launcher/data/model/entity/SettingItemEntity;'
              '-><init>(IILandroid/util/SparseArray;ZILkotlin/jvm/internal/DefaultConstructorMarker;)V\n'
              '\n'
              '    invoke-interface {p0, v0}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    .line 79\n'
              '    return-object p0\n'
              '.end method\n'
              '\n'
              '.method public final m()Ljava/util/List;\n',
              'SettingItemViewModel.k(): add Grant Root Access TYPE_BTN after Clear Cache'
          )

          print("\nAll Grant Root Access patches applied successfully.")
          PYEOF

      - name: Apply Settings Import/Export smali patch
        run: |
          python3 << 'PYEOF'
          import sys

          def patch(path, old, new, label):
              try:
                  content = open(path, encoding='utf-8').read()
              except UnicodeDecodeError:
                  content = open(path, encoding='latin-1').read()
              if old not in content:
                  print(f"ERROR: anchor not found in {path} for: {label}")
                  sys.exit(1)
              open(path, 'w', encoding='utf-8').write(content.replace(old, new, 1))
              print(f"OK: {label}")

          patch(
              'apktool_out/smali_classes10/com/xj/landscape/launcher/ui/gamedetail/GameDetailSettingMenu.smali',
              '    invoke-static {v8, v0}, Lcom/xj/common/utils/XjLog;->c(Ljava/lang/String;Ljava/lang/String;)V\n'
              '\n'
              '    .line 255\n'
              '    return-object v1\n'
              '.end method\n',
              '    invoke-static {v8, v0}, Lcom/xj/common/utils/XjLog;->c(Ljava/lang/String;Ljava/lang/String;)V\n'
              '\n'
              '    .line 255\n'
              '    # BH: p0=this is v19 (locals 19 + 5 params), out of range for invoke-direct; move to v4\n'
              '    move-object/from16 v4, p0\n'
              '    # BH: read GameDetailEntity from continuation L$0 (p1 is null on coroutine resume)\n'
              '    iget-object v3, v5, Lcom/xj/landscape/launcher/ui/gamedetail/GameDetailSettingMenu$getPcGamesOptions$1;->L$0:Ljava/lang/Object;\n'
              '    check-cast v3, Lcom/xj/common/service/bean/GameDetailEntity;\n'
              '\n'
              '    # BH: Export Config option\n'
              '    new-instance v9, Lcom/xj/common/view/popup/Option;\n'
              '    const-string v10, "Export Config"\n'
              '    const/4 v11, 0x0\n'
              '    const/4 v12, 0x0\n'
              '    const/4 v13, 0x0\n'
              '    const/4 v14, 0x0\n'
              '    new-instance v15, Lcom/xj/landscape/launcher/ui/gamedetail/BhExportLambda;\n'
              '    invoke-direct {v15, v4, v3}, Lcom/xj/landscape/launcher/ui/gamedetail/BhExportLambda;-><init>(Lcom/xj/landscape/launcher/ui/gamedetail/GameDetailSettingMenu;Lcom/xj/common/service/bean/GameDetailEntity;)V\n'
              '    const/16 v16, 0x1e\n'
              '    const/16 v17, 0x0\n'
              '    invoke-direct/range {v9 .. v17}, Lcom/xj/common/view/popup/Option;-><init>(Ljava/lang/String;ZIIILkotlin/jvm/functions/Function1;ILkotlin/jvm/internal/DefaultConstructorMarker;)V\n'
              '    invoke-interface {v1, v9}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    # BH: Import Config option\n'
              '    new-instance v9, Lcom/xj/common/view/popup/Option;\n'
              '    const-string v10, "Import Config"\n'
              '    const/4 v11, 0x0\n'
              '    const/4 v12, 0x0\n'
              '    const/4 v13, 0x0\n'
              '    const/4 v14, 0x0\n'
              '    new-instance v15, Lcom/xj/landscape/launcher/ui/gamedetail/BhImportLambda;\n'
              '    invoke-direct {v15, v4, v3}, Lcom/xj/landscape/launcher/ui/gamedetail/BhImportLambda;-><init>(Lcom/xj/landscape/launcher/ui/gamedetail/GameDetailSettingMenu;Lcom/xj/common/service/bean/GameDetailEntity;)V\n'
              '    const/16 v16, 0x1e\n'
              '    const/16 v17, 0x0\n'
              '    invoke-direct/range {v9 .. v17}, Lcom/xj/common/view/popup/Option;-><init>(Ljava/lang/String;ZIIILkotlin/jvm/functions/Function1;ILkotlin/jvm/internal/DefaultConstructorMarker;)V\n'
              '    invoke-interface {v1, v9}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    # BH: Frontend Export option\n'
              '    new-instance v9, Lcom/xj/common/view/popup/Option;\n'
              '    const-string v10, "Frontend Export"\n'
              '    const/4 v11, 0x0\n'
              '    const/4 v12, 0x0\n'
              '    const/4 v13, 0x0\n'
              '    const/4 v14, 0x0\n'
              '    new-instance v15, Lcom/xj/landscape/launcher/ui/gamedetail/BhFrontendExportLambda;\n'
              '    invoke-direct {v15, v4, v3}, Lcom/xj/landscape/launcher/ui/gamedetail/BhFrontendExportLambda;-><init>(Lcom/xj/landscape/launcher/ui/gamedetail/GameDetailSettingMenu;Lcom/xj/common/service/bean/GameDetailEntity;)V\n'
              '    const/16 v16, 0x1e\n'
              '    const/16 v17, 0x0\n'
              '    invoke-direct/range {v9 .. v17}, Lcom/xj/common/view/popup/Option;-><init>(Ljava/lang/String;ZIIILkotlin/jvm/functions/Function1;ILkotlin/jvm/internal/DefaultConstructorMarker;)V\n'
              '    invoke-interface {v1, v9}, Ljava/util/List;->add(Ljava/lang/Object;)Z\n'
              '\n'
              '    return-object v1\n'
              '.end method\n',
              'GameDetailSettingMenu.W(): inject Export Config + Import Config + Frontend Export options'
          )
          print("Settings Import/Export patch applied.")
          PYEOF

      - name: Patch GameDetailActivity — finish after Beacon auto-launch
        run: |
          python3 << 'PYEOF'
          import sys
          path = 'apktool_out/smali_classes8/com/xj/landscape/launcher/ui/gamedetail/GameDetailActivity.smali'
          content = open(path, encoding='utf-8').read()
          old = (
              '    .line 61\n'
              '    .line 62\n'
              '    new-instance p0, Lcom/xj/landscape/launcher/event/SendClickStartGameEvent;\n'
              '\n'
              '    .line 63\n'
              '    .line 64\n'
              '    .line 65\n'
              '    invoke-direct {p0, v0}, Lcom/xj/landscape/launcher/event/SendClickStartGameEvent;-><init>(Lcom/xj/common/service/bean/GameStartupParams;)V\n'
              '\n'
              '    .line 66\n'
              '    .line 67\n'
              '    .line 68\n'
              '    invoke-static {p0, v5, v4, v5}, Lcom/drake/channel/ChannelKt;->c(Ljava/lang/Object;Ljava/lang/String;ILjava/lang/Object;)Lkotlinx/coroutines/Job;\n'
              '\n'
              '    .line 69\n'
              '    return-void'
          )
          new = (
              '    .line 61\n'
              '    .line 62\n'
              '    move-object v1, p0\n'
              '    new-instance p0, Lcom/xj/landscape/launcher/event/SendClickStartGameEvent;\n'
              '\n'
              '    .line 63\n'
              '    .line 64\n'
              '    .line 65\n'
              '    invoke-direct {p0, v0}, Lcom/xj/landscape/launcher/event/SendClickStartGameEvent;-><init>(Lcom/xj/common/service/bean/GameStartupParams;)V\n'
              '\n'
              '    .line 66\n'
              '    .line 67\n'
              '    .line 68\n'
              '    invoke-static {p0, v5, v4, v5}, Lcom/drake/channel/ChannelKt;->c(Ljava/lang/Object;Ljava/lang/String;ILjava/lang/Object;)Lkotlinx/coroutines/Job;\n'
              '\n'
              '    # BannerHub: finish+remove task after Beacon auto-launch so task 7231 never appears in recents\n'
              '    invoke-virtual {v1}, Landroid/app/Activity;->finishAndRemoveTask()V\n'
              '\n'
              '    .line 69\n'
              '    return-void'
          )
          if old not in content:
              print("ERROR: anchor not found in GameDetailActivity.smali")
              sys.exit(1)
          open(path, 'w', encoding='utf-8').write(content.replace(old, new, 1))
          print("GameDetailActivity auto-launch finish patch applied.")
          PYEOF

      - name: Patch package name for pre/beta (isolate from stable installs)
        run: |
          sed -i "s/gamehub\.lite/com.tencent.ig/g" apktool_out/AndroidManifest.xml
          sed -i 's/android:label="GameHub Revanced"/android:label="BannerHub PuBG"/' apktool_out/AndroidManifest.xml

      - name: Rebuild and Sign (Normal variant only)
        run: |
          echo "Building Normal variant (com.tencent.ig — pre/beta isolated package)..."

          # Rebuild
          java -jar $HOME/bin/apktool.jar b apktool_out -o rebuilt-unsigned.apk

          # Inject original classes12.dex (skipped smali reassembly due to dex index limit)
          zip rebuilt-unsigned.apk classes12.dex

          # Compile and inject GOG extension dex as classes18.dex
          ANDROID_JAR=$(ls $ANDROID_SDK_ROOT/platforms/android-*/android.jar 2>/dev/null | sort -V | tail -1)
          mkdir -p ext_classes
          javac -source 8 -target 8 -cp "$ANDROID_JAR" -d ext_classes extension/*.java
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          mkdir -p ext_dex
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/d8 --release --min-api 26 --output ext_dex $(find ext_classes -name "*.class")
          cp ext_dex/classes.dex classes18.dex
          zip -j rebuilt-unsigned.apk classes18.dex

          # Align
          ${ANDROID_SDK_ROOT}/build-tools/$(ls ${ANDROID_SDK_ROOT}/build-tools | tail -1)/zipalign -f -v 4 rebuilt-unsigned.apk rebuilt-aligned.apk

          # Sign
          APK_NAME="BannerHub-${GITHUB_REF_NAME}-Normal.apk"
          ${ANDROID_SDK_ROOT}/build-tools/$(ls ${ANDROID_SDK_ROOT}/build-tools | tail -1)/apksigner sign \
            --key testkey.pk8 \
            --cert testkey.x509.pem \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$APK_NAME" \
            rebuilt-aligned.apk

          echo "Done: $APK_NAME ($(du -sh "$APK_NAME" | cut -f1))"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: BannerHub-pre-${{ github.ref_name }}
          path: BannerHub-*.apk
          retention-days: 30
